<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <title>雙語即時聊天橋</title>
  <script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-database-compat.js"></script>
  <style>
    body { font-family: sans-serif; max-width: 800px; margin: auto; padding: 20px; }
    #chat { height: 400px; overflow-y: auto; border: 1px solid #ccc; padding: 10px; margin-bottom: 10px; }
    .msg-box { margin: 10px 0; padding: 10px; background: #f0f9ff; border-radius: 8px; }
    /* 強制標記不被翻譯的區域 */
    .no-translate { font-weight: bold; }
    .translate-area { color: #555; font-style: italic; }
  </style>
</head>
<body>

<div id="chat"></div>
<input id="msg" placeholder="輸入中文...">
<button onclick="sendMsg()">發送</button>

<script>
  // Firebase 設定
  const firebaseConfig = {
    apiKey: "AIzaSyDrjR4yYBjps4_5ZVligKwKnBSwF8_Pkws",
    databaseURL: "https://chat-bridge-f89ed-default-rtdb.firebaseio.com"
  };
  firebase.initializeApp(firebaseConfig);
  const db = firebase.database();

  function sendMsg() {
    const input = document.getElementById("msg");
    if (!input.value.trim()) return;
    db.ref("messages").push({ text: input.value });
    input.value = "";
  }

  db.ref("messages").on("child_added", (snapshot) => {
    const msg = snapshot.val();
    const chat = document.getElementById("chat");
    const div = document.createElement("div");
    div.className = "msg-box";
    
    // 使用 translate 屬性排除翻譯，確保按鈕文字不被改掉
    div.innerHTML = `
      <div class="no-translate">💬 ${msg.text}</div>
      <button class="no-translate" onclick="speak('${msg.text}')">🔊 中文朗讀</button>
      <div class="translate-area" translate="yes">俄文翻譯載入中...</div>
    `;
    chat.appendChild(div);
  });

  function speak(text) {
    const u = new SpeechSynthesisUtterance(text);
    u.lang = 'zh-TW';
    speechSynthesis.speak(u);
  }
</script>
</body>
</html>
