<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>🌉 雙語即時聊天橋</title>
  <script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-database-compat.js"></script>
  <style>
    body { font-family: "Microsoft JhengHei", sans-serif; max-width: 800px; margin: auto; padding: 20px; background-color: #f4f6f9; }
    #chat { border: 1px solid #e2e8f0; height: 500px; overflow-y: auto; padding: 15px; background: white; border-radius: 12px; margin-bottom: 10px; }
    .msg-box { margin-bottom: 15px; }
    .msg-content { background: #e6f7ff; padding: 10px; border-radius: 8px; display: inline-block; }
    .btn { background: #10b981; color: white; border: none; padding: 4px 8px; border-radius: 4px; cursor: pointer; font-size: 12px; margin-top: 5px; }
  </style>
</head>
<body>

<h2>🌉 與俄國朋友的即時聊天橋</h2>
<div id="chat"></div>
<div style="display: flex; gap: 10px;">
  <input id="msg" style="flex: 1; padding: 10px;" placeholder="輸入訊息...">
  <button onclick="sendMsg()">發送</button>
</div>

<script>
  // 這是您正確的 Firebase 設定，我們只用它來存訊息，不用它來呼叫 AI
  const firebaseConfig = {
    apiKey: "AIzaSyDrjR4yYBjps4_5ZVligKwKnBSwF8_Pkws",
    authDomain: "chat-bridge-f89ed.firebaseapp.com",
    databaseURL: "https://chat-bridge-f89ed-default-rtdb.firebaseio.com",
    projectId: "chat-bridge-f89ed",
    storageBucket: "chat-bridge-f89ed.firebasestorage.app",
    messagingSenderId: "622910981254",
    appId: "1:622910981254:web:1d9d07862a765c31f6fd07",
    measurementId: "G-PLGDSEQKSP"
  };
  firebase.initializeApp(firebaseConfig);
  const db = firebase.database();

  function sendMsg() {
    const input = document.getElementById("msg");
    if (!input.value.trim()) return;
    db.ref("messages").push({ text: input.value, timestamp: Date.now() });
    input.value = "";
  }

  db.ref("messages").on("child_added", (snapshot) => {
    const msg = snapshot.val();
    const chat = document.getElementById("chat");
    const div = document.createElement("div");
    div.className = "msg-box";
    div.innerHTML = `
      <div class="msg-content">💬 ${msg.text}</div><br>
      <button class="btn" onclick="speak('${msg.text}')">🔊 朗讀</button>
    `;
    chat.appendChild(div);
    chat.scrollTop = chat.scrollHeight;
  });

  function speak(text) {
    speechSynthesis.cancel();
    const utterance = new SpeechSynthesisUtterance(text);
    utterance.lang = 'zh-TW';
    speechSynthesis.speak(utterance);
  }
</script>
</body>
</html>
