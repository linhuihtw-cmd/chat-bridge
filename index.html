<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>🌉 雙語即時聊天橋</title>
  <script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-database-compat.js"></script>
  <style>
    body { font-family: "Microsoft JhengHei", sans-serif; max-width: 800px; margin: auto; padding: 20px; background-color: #f4f6f9; }
    #chat { border: 1px solid #e2e8f0; height: 500px; overflow-y: auto; padding: 15px; background: white; border-radius: 12px; margin-bottom: 10px; }
    .msg-box { margin: 10px 0; padding: 12px; border-radius: 8px; background: #e6f7ff; }
    .lang-zh { font-weight: bold; color: #1a1a1a; }
    .lang-ru { font-style: italic; color: #555; margin-top: 5px; }
  </style>
</head>
<body>

<h2>🌉 雙語即時聊天橋 (中俄對照版)</h2>
<div id="chat"></div>
<div style="display: flex; gap: 10px;">
  <input id="msg" style="flex: 1; padding: 10px;" placeholder="輸入中文...">
  <button onclick="sendMsg()">發送</button>
</div>

<script>
  const firebaseConfig = {
    apiKey: "AIzaSyDrjR4yYBjps4_5ZVligKwKnBSwF8_Pkws",
    authDomain: "chat-bridge-f89ed.firebaseapp.com",
    databaseURL: "https://chat-bridge-f89ed-default-rtdb.firebaseio.com",
    projectId: "chat-bridge-f89ed",
    storageBucket: "chat-bridge-f89ed.firebasestorage.app",
    messagingSenderId: "622910981254",
    appId: "1:622910981254:web:1d9d07862a765c31f6fd07"
  };
  firebase.initializeApp(firebaseConfig);
  const db = firebase.database();

  function sendMsg() {
    const input = document.getElementById("msg");
    if (!input.value.trim()) return;
    db.ref("messages").push({ text: input.value, timestamp: Date.now() });
    input.value = "";
  }

  db.ref("messages").on("child_added", (snapshot) => {
    const msg = snapshot.val();
    const chat = document.getElementById("chat");
    const div = document.createElement("div");
    div.className = "msg-box";
    
    // 這裡我們直接利用 Google 翻譯連結，讓俄國朋友點擊即可看到對照
    const ruLink = `https://translate.google.com/?sl=zh-TW&tl=ru&text=${encodeURIComponent(msg.text)}`;
    
    div.innerHTML = `
      <div class="lang-zh">💬 ${msg.text}</div>
      <button onclick="speak('${msg.text}')">🔊 朗讀中文</button>
      <div class="lang-ru"><a href="${ruLink}" target="_blank">👉 點此查看俄文翻譯</a></div>
    `;
    chat.appendChild(div);
    chat.scrollTop = chat.scrollHeight;
  });

  function speak(text) {
    speechSynthesis.cancel();
    const u = new SpeechSynthesisUtterance(text);
    u.lang = 'zh-TW';
    speechSynthesis.speak(u);
  }
</script>
</body>
</html>
