<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>🌉 雙語聊天橋 (完全免金鑰穩定版)</title>
  <style>
    body { font-family: "Microsoft JhengHei", sans-serif; max-width: 950px; margin: auto; padding: 15px; background-color: #f4f6f9; }
    h2 { text-align: center; }
    #chat { border: 1px solid #e2e8f0; padding: 15px; height: 650px; overflow-y: auto; background: #ffffff; border-radius: 16px; margin-bottom: 15px; }
    .msg-box { margin-bottom: 10px; display: flex; flex-direction: column; }
    .bubble { padding: 10px 14px; border-radius: 14px; max-width: 75%; font-size: 15px; }
    .chat-text { background: #e6f7ff; align-self: flex-start; }
    .ai-card { background: #f6ffed; border: 1px solid #d9f7be; align-self: flex-end; width: 75%; padding: 12px; }
    .inner-audio-btn { background: #10b981; color: white; border: none; border-radius: 4px; padding: 2px 6px; font-size: 11px; cursor: pointer; }
    .input-area { display: flex; gap: 10px; }
    input { flex: 1; padding: 12px; border-radius: 10px; border: 1px solid #ccc; }
    .btn-send { padding: 10px 24px; background: #3b82f6; color: white; border: none; border-radius: 10px; cursor: pointer; }
  </style>
</head>

<body>
<h2>🌉 雙語聊天橋 (完全免金鑰版)</h2>
<div id="chat"></div>
<div class="input-area">
  <input id="msg" placeholder="輸入內容..." onkeydown="if(event.keyCode==13) sendMsg()" />
  <button class="btn-send" onclick="sendMsg()">發送</button>
</div>

<script>
// 此版本完全不需要 API_KEY，請直接使用！
function sendMsg() {
  const inputObj = document.getElementById("msg");
  const text = inputObj.value.trim();
  if (!text) return;

  const chat = document.getElementById("chat");
  
  // 顯示使用者輸入
  chat.innerHTML += `<div class="msg-box"><div class="bubble chat-text">💬 訊息： ${text}</div></div>`;
  
  // 顯示系統翻譯提示卡
  chat.innerHTML += `
    <div class="msg-box">
      <div class="bubble ai-card">
        🤖 <b>系統提示</b><br>
        【中文原文】 ${text}<br>
        【操作建議】 請在頁面空白處按滑鼠右鍵，選擇「翻譯成俄文」。<br>
        <button class="inner-audio-btn" onclick="speak('${text}')">🔊 朗讀原文</button>
      </div>
    </div>`;
  
  chat.scrollTop = chat.scrollHeight;
  inputObj.value = "";
}

function speak(text) {
  speechSynthesis.cancel();
  const utterance = new SpeechSynthesisUtterance(text);
  utterance.lang = 'zh-TW';
  speechSynthesis.speak(utterance);
}
</script>
</body>
</html>
