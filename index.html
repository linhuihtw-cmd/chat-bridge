<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>🌉 雙語聊天橋 (安全版)</title>
  <script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-database-compat.js"></script>
  </head>

<body>
<h2>🌉 雙語聊天橋 (安全模式)</h2>
<div id="chat"></div>
<div class="input-area">
  <input id="msg" placeholder="輸入內容..." onkeydown="if(event.keyCode==13) sendMsg()" />
  <button id="sendBtn" class="btn-send" onclick="sendMsg()">送出</button>
  <button class="btn-clear-db" onclick="secureClearDatabase()">⚙️</button>
</div>

<script>
// Firebase 初始化
const firebaseConfig = { /* 貼上你原本的 config */ };
firebase.initializeApp(firebaseConfig);
const db = firebase.database();

// 核心安全邏輯：從瀏覽器暫存讀取金鑰，若無則要求輸入
function getApiKey() {
  let key = sessionStorage.getItem("DS_KEY");
  if (!key) {
    key = prompt("請輸入你的 DeepSeek API Key (僅本次視窗有效)：");
    if (key) sessionStorage.setItem("DS_KEY", key);
  }
  return key;
}

async function callDeepSeek(text) {
  const key = getApiKey();
  if (!key) return "錯誤：未提供 API Key";
  
  try {
    const res = await fetch("https://api.deepseek.com/chat/completions", {
      method: "POST",
      headers: {
        "Content-Type": "application/json",
        "Authorization": `Bearer ${key.trim()}`
      },
      body: JSON.stringify({
        model: "deepseek-chat",
        messages: [{ role: "user", content: text }],
        temperature: 0.7
      })
    });
    
    if (res.status === 402) return "錯誤：API 餘額不足 (402)";
    if (!res.ok) return "錯誤：API 連線失敗";
    
    const data = await res.json();
    return data.choices[0].message.content;
  } catch (e) {
    return "錯誤：" + e.message;
  }
}

// 其餘 sendMsg 與 renderChat 邏輯與之前相同...
</script>
</body>
</html>
