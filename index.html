<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>🌉 雙語聊天橋 v20.7</title>
  <script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-database-compat.js"></script>
  <style>
    body { font-family: "Microsoft JhengHei", sans-serif; max-width: 950px; margin: auto; padding: 15px; background-color: #f4f6f9; }
    #chat { border: 1px solid #e2e8f0; padding: 15px; height: 650px; overflow-y: auto; background: #ffffff; border-radius: 16px; margin-bottom: 15px; }
    .msg-box { margin-bottom: 10px; display: flex; flex-direction: column; }
    .bubble { padding: 10px 14px; border-radius: 14px; max-width: 75%; font-size: 15px; }
    .chat-text { background: #e6f7ff; color: #0b3a60; align-self: flex-start; }
    .ai-card { background: #f6ffed; color: #237804; align-self: flex-end; width: 75%; border: 1px solid #d9f7be; border-radius: 14px; padding: 12px; }
    .input-area { display: flex; gap: 10px; }
    input { flex: 1; padding: 10px; }
  </style>
</head>
<body>
<h2>🌉 雙語聊天橋 v20.7</h2>
<div id="chat"></div>
<div class="input-area">
  <input id="msg" placeholder="輸入內容..." />
  <button onclick="sendMsg()">送出</button>
</div>

<script>
// 請將金鑰貼在下方引號內
const API_KEY = "AQ.Ab8RN6JPxMiEf6xXXTQSWrDLOUjIR88_QyTVaWsCUegg8fcizw"; 

const db = firebase.database(firebase.initializeApp({
  databaseURL: "https://chat-bridge-f89ed-default-rtdb.firebaseio.com"
}));

async function sendMsg() {
  const input = document.getElementById("msg").value.trim();
  if (!input) return;
  db.ref("messages").push({ role: "user", text: input, timestamp: Date.now() });
  document.getElementById("msg").value = "";

  try {
    // 這是最安全的寫法：直接將 key 接在 URL 後面，避免 header 編碼問題
    const url = "https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash:generateContent?key=" + API_KEY.replace(/[\s\u200b]/g, '');
    const response = await fetch(url, {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ contents: [{ parts: [{ text: "請翻譯：" + input }] }] })
    });
    
    const result = await response.json();
    const text = result.candidates[0].content.parts[0].text;
    db.ref("messages").push({ role: "ai", text: text, timestamp: Date.now() });
  } catch (e) {
    db.ref("messages").push({ role: "ai", text: "錯誤：" + e.message, timestamp: Date.now() });
  }
}

db.ref("messages").on("child_added", (s) => {
  const m = s.val();
  document.getElementById("chat").innerHTML += `<div class="msg-box"><div class="bubble ${m.role === 'user' ? 'chat-text' : 'ai-card'}">${m.text.replace(/\n/g, '<br>')}</div></div>`;
});
</script>
</body>
</html>
