<!-- 登入畫面：尚未登入時顯示 -->

function loginWithGoogle() {
  const provider = new firebase.auth.GoogleAuthProvider();
  auth.signInWithPopup(provider).catch((err) => {
    alert("登入失敗：" + err.message);
  });
}

function logoutUser() {
  auth.signOut();
}

function showScreen(screenId) {
  ["loginScreen", "pendingScreen", "mainApp"].forEach(id => {
    document.getElementById(id).style.display = (id === screenId) ? (id === "mainApp" ? "block" : "flex") : "none";
  });
}

function emailToKey(email) {
  return email.replace(/[.#$/[\]]/g, "_");
}

function renderPendingList(pendingUsers) {
  const adminPanel = document.getElementById("adminPanel");
  const pendingList = document.getElementById("pendingList");
  const keys = Object.keys(pendingUsers || {});

  if (keys.length === 0) {
    adminPanel.style.display = "none";
    return;
  }

  adminPanel.style.display = "block";
  pendingList.innerHTML = keys.map(key => {
    const userInfo = pendingUsers[key];
    const safeEmail = (userInfo.email || "").replace(/'/g, "\\'");
    return `<div class="pending-item">
      <span class="pending-item-email">${userInfo.email || key}</span>
      <button class="btn-approve" onclick="approveUser('${key}', '${safeEmail}')">核准 / Одобрить</button>
    </div>`;
  }).join("");
}

function approveUser(key, email) {
  db.ref("approvedUsers/" + key).set({ email: email, approvedAt: Date.now() });
  db.ref("pendingUsers/" + key).remove();
}

auth.onAuthStateChanged((user) => {
  if (!user) {
    currentUser = null;
    showScreen("loginScreen");
    document.getElementById("adminPanel").style.display = "none";
    return;
  }

  currentUser = user;
  const userKey = emailToKey(user.email);

  if (user.email === ADMIN_EMAIL) {
    db.ref("approvedUsers/" + userKey).set({ email: user.email, approvedAt: Date.now() });
    showScreen("mainApp");
    db.ref("pendingUsers").on("value", (snapshot) => {
      renderPendingList(snapshot.val());
    });
    return;
  }

  db.ref("approvedUsers/" + userKey).once("value").then((snapshot) => {
    if (snapshot.exists()) {
      showScreen("mainApp");
    } else {
      db.ref("pendingUsers/" + userKey).set({ email: user.email, requestedAt: Date.now() });
      document.getElementById("pendingEmail").innerText = user.email;
      showScreen("pendingScreen");

      db.ref("approvedUsers/" + userKey).on("value", (approvedSnap) => {
        if (approvedSnap.exists()) {
          showScreen("mainApp");
        }
      });
    }
  });
});


let chatHistory = [];
let isTabActive = true;
let titleFlashInterval = null;
let isSending = false;

function playNotificationSound() {
  try {
    const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    const oscillator = audioCtx.createOscillator();
    const gainNode = audioCtx.createGain();
    
    oscillator.type = 'sine';
    oscillator.frequency.setValueAtTime(587.33, audioCtx.currentTime); 
    oscillator.frequency.setValueAtTime(880, audioCtx.currentTime + 0.1); 
    
    gainNode.gain.setValueAtTime(0.1, audioCtx.currentTime);
    gainNode.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.4);
    
    oscillator.connect(gainNode);
    gainNode.connect(audioCtx.destination);
    
    oscillator.start();
    oscillator.stop(audioCtx.currentTime + 0.4);
  } catch (e) {
    console.log("音效阻擋");
  }
}

function flashTabTitle() {
  if (titleFlashInterval) return;
  let isOldTitle = true;
  titleFlashInterval = setInterval(() => {
    document.title = isOldTitle ? "💬 【新翻譯訊息 / Новое сообщение】" : "🌉 雙語聊天橋 v20.7";
    isOldTitle = !isOldTitle;
  }, 1000);
}

function copyThisLine(text, btnObj) {
  let cleanText = text.replace(/["'「」]/g, "").trim();
  if(!cleanText) return;

  navigator.clipboard.writeText(cleanText).then(() => {
    btnObj.innerText = "✅ Скопировано";
    btnObj.style.background = "#10b981";
    btnObj.style.color = "white";
    btnObj.style.borderColor = "#10b981";
    
    setTimeout(() => {
      btnObj.innerText = "📋 Скопировать";
      btnObj.style.background = "#ffffff";
      btnObj.style.color = "#475569";
      btnObj.style.borderColor = "#cbd5e1";
    }, 1500);
  }).catch(err => {
    alert("複製失敗：" + err);
  });
}

function renderChat() {
  const chat = document.getElementById("chat");
  chat.innerHTML = chatHistory.map((m, index) => {
    if (m.role === "user") {
      return `<div class="msg-box"><div class="bubble chat-text">💬 訊息 / Сообщение： ${m.text}</div></div>`;
    } else {
      let rawText = m.text;
      if (rawText.startsWith("【連線失敗原因】") || rawText.startsWith("錯誤：") || rawText.startsWith("【除錯資訊】")) {
        return `<div class="msg-box"><div class="bubble error-card">🤖 <b>DeepSeek 系統回報 / Отчет системы</b><br>${rawText}</div></div>`;
      }
      rawText = rawText.replace(/\[pinyin_audio\]/gi, '').trim();

      let correspondingUserInput = "";
      for (let i = index - 1; i >= 0; i--) {
        if (chatHistory[i] && chatHistory[i].role === "user") {
          correspondingUserInput = chatHistory[i].text.trim();
          break;
        }
      }

      let tagRegex = /(【[^】]+】[^【\n]*)/g;
      let matchedBlocks = rawText.match(tagRegex) || rawText.split('\n');
      
      let tradContent = "";
      matchedBlocks.forEach(block => {
        if (block.includes("【繁體中文")) {
          let match = block.match(/^【[^】]+】([\s\S]*)$/);
          if (match) tradContent = match[1].trim();
        }
      });

      let processedLines = matchedBlocks.map(block => {
        let trimmedLine = block.replace(/^\s*\*\s*/, "").trim();
        if(!trimmedLine) return "";

        if (trimmedLine.startsWith("【繁體中文") && tradContent !== "" && correspondingUserInput !== "") {
          let hasSimplified = detectSimplifiedByDetectiveLogic(correspondingUserInput);
          let isIncluded = correspondingUserInput.includes(tradContent) || tradContent.includes(correspondingUserInput);
          if (!hasSimplified && isIncluded) return "";
        }

        if (/(【中文發音[^】]*】|【[^】]*Пиньинь[^】]*】|【[^в]*Pinyin[^】]*】)/i.test(trimmedLine)) {
          return `<div class="card-line">${trimmedLine} <button class="inner-audio-btn" onclick="speakThisText(${index})">🔊 Озвучить</button></div>`;
        }
        if (/【俄文翻譯[^】]*】/.test(trimmedLine)) {
          return `<div class="card-line">${trimmedLine} <button class="inner-audio-btn" onclick="speakRussianText(${index})">🔊 朗讀俄文</button></div>`;
        }
        if (trimmedLine.startsWith("【語意解釋")) return `<div class="card-line collapsible-explanation" style="display:none;">${trimmedLine}</div>`;

        let matchField = trimmedLine.match(/^【([^】]+)】([\s\S]*)$/);
        if (matchField && matchField[2].trim().length > 0) {
          let contentText = matchField[2].trim();
          let safeContent = contentText.replace(/["'「」]/g, "").replace(/\\/g, '\\\\').replace(/'/g, "\\'");
          return `<div class="card-line">${trimmedLine} <button class="inline-copy-btn" onclick="copyThisLine('${safeContent}', this)">📋 Скопировать</button></div>`;
        }
        return `<div class="card-line">${trimmedLine}</div>`;
      });

      let finalHtmlText = processedLines.filter(l => l !== "").join('');
      let hasExplanation = finalHtmlText.includes("collapsible-explanation");
      let toggleBtn = hasExplanation ? `<div class="card-line"><button class="toggle-explain-btn" onclick="toggleExplanation(${index})">📖 顯示詳細解釋</button></div>` : "";
      return `<div class="msg-box"><div class="bubble ai-card">🤖 <b>DeepSeek 翻譯字卡 / Карточка перевода</b>${finalHtmlText}${toggleBtn}</div></div>`;
    }
  }).join("");
  chat.scrollTop = chat.scrollHeight;
}

function buildPrompt(input) {
  return `你是中俄翻譯與語言學習字卡產生器。依以下固定欄位輸出，每欄位獨立成行：

【繁體中文 / Традиционный китайский】內容
【中文發音 / Пиньинь】內容
【簡體中文 / Упрощенный китайский】內容
【俄文翻譯 / Русский перевод】內容（純俄文輸入時省略此欄）
【語意解釋 / Смысловое пояснение】中文：...俄文：...

規則：
- 繁體中文欄位須為台灣繁體字
- 成語/諺語/俚語解釋須中性、依語境而定，除非該詞語本身僅有單一褒貶義，否則需說明可用於正面與負面語境並各舉簡短例子；避免使用「壞人」「不好的」等主觀評價字眼

輸入：${input}`;
}

async function callDeepSeek(text) {
  try {
    const res = await fetch(`https://${API_KEY.trim()}`, {
      method: "POST",
      headers: {
        "Content-Type": "application/json"
      },
      body: JSON.stringify({
        model: "deepseek-chat",
        messages: [{ role: "user", content: text }],
        stream: false
      })
    });
    
    if (!res.ok) {
      let errorDetail = "";
      try {
        const errJson = await res.json();
        errorDetail = errJson?.error?.message || JSON.stringify(errJson);
      } catch (e) {
        errorDetail = await res.text().catch(() => "(無法讀取錯誤內容)");
      }
      return `【連線失敗原因】：HTTP ${res.status} - ${errorDetail}`;
    }

    const data = await res.json();
    if (data && data.choices && data.choices[0] && data.choices[0].message) {
      return data.choices[0].message.content || "（沒有回應 / Нет ответа）";
    } else {
      return `【除錯資訊】HTTP狀態正常，但內容結構異常，Worker實際回傳：\n${JSON.stringify(data, null, 2)}`;
    }
  } catch (e) {
    return "錯誤 / Ошибка：" + e.message;
  }
}

async function sendMsg() {
  if (isSending) return; 

  const inputObj = document.getElementById("msg");
  const input = inputObj.value.trim();
  if (!input) return;

  const now = Date.now();
  if (input === lastSentText && (now - lastSentTime) < COOLDOWN_MS) {
    alert("請稍候，同一句話剛剛已經送出過了 / Подождите, это сообщение уже было отправлено");
    return;
  }
  lastSentText = input;
  lastSentTime = now;

  isSending = true;
  const sendBtn = document.getElementById("sendBtn");
  sendBtn.disabled = true;
  sendBtn.innerText = "處理中... / Обработка...";
  inputObj.value = "";
  inputObj.focus();

  db.ref("messages").push({ role: "user", text: input, timestamp: Date.now() });

  const translatedText = await callDeepSeek(buildPrompt(input));
  
  db.ref("messages").push({ role: "ai", text: translatedText, timestamp: Date.now() });

  isSending = false;
  sendBtn.disabled = false;
  sendBtn.innerText = "送出 / Отправить";
}

function speakThisText(index) {
  const targetMsg = chatHistory[index];
  if (!targetMsg || !targetMsg.text) return;
  let textToSpeak = "";
  const matchTrad = targetMsg.text.match(/【繁體中文.*?】([\s\S]*?)(?=【|$)/);
  if (matchTrad) textToSpeak = matchTrad[1].trim();
  else {
    for (let i = index; i >= 0; i--) {
      if (chatHistory[i].role === "user") { textToSpeak = chatHistory[i].text.trim(); break; }
    }
  }
  if (!textToSpeak) return;
  textToSpeak = textToSpeak.replace(/【.*?】/g, "").replace(/["'「」]/g, "").trim();
  speechSynthesis.cancel();
  const utteranceCorrect = new SpeechSynthesisUtterance(textToSpeak);
  utteranceCorrect.lang = "zh-TW";
  utteranceCorrect.volume = 1.0; 
  utteranceCorrect.rate = 0.95;  
  speechSynthesis.speak(utteranceCorrect);
}

function speakRussianText(index) {
  const targetMsg = chatHistory[index];
  if (!targetMsg || !targetMsg.text) return;
  const matchRu = targetMsg.text.match(/【俄文翻譯[^】]*】([\s\S]*?)(?=【|$)/);
  if (!matchRu) return;
  let textToSpeak = matchRu[1].trim().replace(/["'「」]/g, "").trim();
  if (!textToSpeak) return;
  speechSynthesis.cancel();
  const utteranceRu = new SpeechSynthesisUtterance(textToSpeak);
  utteranceRu.lang = "ru-RU";
  utteranceRu.volume = 1.0;
  utteranceRu.rate = 0.9;
  speechSynthesis.speak(utteranceRu);
}

function toggleExplanation(index) {
  const allCards = document.querySelectorAll(".msg-box");
  const targetCard = allCards[index] ? allCards[index].querySelector(".ai-card") : null;
  if (!targetCard) return;
  const explanationDiv = targetCard.querySelector(".collapsible-explanation");
  const btn = targetCard.querySelector(".toggle-explain-btn");
  if (!explanationDiv || !btn) return;
  const isHidden = explanationDiv.style.display === "none";
  explanationDiv.style.display = isHidden ? "block" : "none";
  btn.innerText = isHidden ? "📖 隱藏詳細解釋" : "📖 顯示詳細解釋";
}

db.ref("messages").on("child_added", (snapshot) => {
  const newMsg = snapshot.val();
  if (!newMsg || !newMsg.text) return;
  chatHistory.push(newMsg);
  renderChat();
});
</script>
