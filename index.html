<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>🌉 雙語即時聊天橋</title>
  <!-- 載入 Firebase CDN -->
  <script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-database-compat.js"></script>
  <style>
    body { font-family: sans-serif; max-width: 800px; margin: auto; padding: 20px; background-color: #f4f6f9; }
    #chat { border: 1px solid #ccc; height: 500px; overflow-y: auto; padding: 15px; background: white; border-radius: 12px; margin-bottom: 10px; }
    .msg { margin: 10px 0; padding: 10px; border-radius: 8px; background: #e6f7ff; }
  </style>
</head>
<body>

<h2>🌉 與俄國朋友的即時聊天橋</h2>
<div id="chat"></div>
<div style="display: flex; gap: 10px;">
  <input id="msg" style="flex: 1; padding: 10px;" placeholder="輸入訊息...">
  <button onclick="sendMsg()">發送</button>
</div>

<script>
  // 您提供的 Firebase 設定
  const firebaseConfig = {
    apiKey: "AIzaSyDrjR4yYBjps4_5ZVligKwKnBSwF8_Pkws",
    authDomain: "chat-bridge-f89ed.firebaseapp.com",
    databaseURL: "https://chat-bridge-f89ed-default-rtdb.firebaseio.com",
    projectId: "chat-bridge-f89ed",
    storageBucket: "chat-bridge-f89ed.firebasestorage.app",
    messagingSenderId: "622910981254",
    appId: "1:622910981254:web:1d9d07862a765c31f6fd07",
    measurementId: "G-PLGDSEQKSP"
  };

  // 初始化
  firebase.initializeApp(firebaseConfig);
  const db = firebase.database();

  function sendMsg() {
    const input = document.getElementById("msg");
    if (!input.value.trim()) return;
    // 將訊息推送到 Firebase
    db.ref("messages").push({ text: input.value, timestamp: Date.now() });
    input.value = "";
  }

  // 自動接收所有訊息
  db.ref("messages").on("child_added", (snapshot) => {
    const msg = snapshot.val();
    const chat = document.getElementById("chat");
    chat.innerHTML += `<div class="msg">💬 ${msg.text}</div>`;
    chat.scrollTop = chat.scrollHeight;
  });
</script>
</body>
</html>
