<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>🌉 雙語聊天橋 v20.7 (復原優化版)</title>
  <script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-database-compat.js"></script>
  <style>
    body { font-family: "Microsoft JhengHei", sans-serif; max-width: 950px; margin: auto; padding: 15px; background-color: #f4f6f9; }
    h2 { text-align: center; color: #1a1a1a; margin-bottom: 10px; }
    #apiKeyInput { display: block; margin: 0 auto 15px; padding: 8px; width: 350px; border: 1px solid #cbd5e1; border-radius: 8px; }
    #chat { border: 1px solid #e2e8f0; padding: 15px; height: 600px; overflow-y: auto; background: #ffffff; border-radius: 16px; margin-bottom: 15px; }
    .bubble { padding: 10px 14px; border-radius: 14px; margin-bottom: 10px; max-width: 80%; font-size: 15px; }
    .chat-text { background: #e6f7ff; color: #0b3a60; align-self: flex-start; }
    .ai-card { background: #f6ffed; color: #237804; align-self: flex-end; width: 85%; padding-bottom: 10px; }
    .inner-audio-btn { background: #10b981; color: white; border: none; border-radius: 4px; padding: 2px 6px; font-size: 11px; cursor: pointer; }
    .inline-copy-btn { background: #ffffff; color: #475569; border: 1px solid #cbd5e1; border-radius: 4px; padding: 1px 6px; font-size: 11px; cursor: pointer; }
    .input-area { display: flex; gap: 10px; }
    input { flex: 1; padding: 12px; border: 1px solid #cbd5e1; border-radius: 10px; }
    .btn-send { padding: 10px 24px; background: #3b82f6; color: white; border: none; border-radius: 10px; cursor: pointer; }
    .card-line { margin-top: 5px; }
  </style>
</head>

<body>
  <h2>🌉 雙語聊天橋 v20.7</h2>
  <input type="password" id="apiKeyInput" placeholder="AQ.Ab8RN6KDLL0RQcmjLwARJp8Y1vgrPrfCHDzJrYwFr9MzqsGscA">
  <div id="chat"></div>
  <div class="input-area">
    <input id="msg" placeholder="輸入內容..." onkeydown="if(event.keyCode==13) sendMsg()" />
    <button id="sendBtn" class="btn-send" onclick="sendMsg()">送出</button>
  </div>

<script>
const firebaseConfig = { /* 請保持你原本的配置 */ };
firebase.initializeApp(firebaseConfig);
const db = firebase.database();
let chatHistory = [];

async function callGemini(text) {
  const apiKey = document.getElementById("apiKeyInput").value.trim();
  if(!apiKey) return "⚠️ 請先輸入 API 金鑰";
  
  // 核心：使用你驗證成功的 3.5-flash
  const url = `https://generativelanguage.googleapis.com/v1beta/models/gemini-3.5-flash:generateContent?key=${apiKey}`;
  const res = await fetch(url, {
    method: "POST",
    headers: { "Content-Type": "application/json" },
    body: JSON.stringify({ contents: [{ parts: [{ text }] }] })
  });
  const data = await res.json();
  return data?.candidates?.[0]?.content?.parts?.[0]?.text || "無回應";
}

// 這裡放入你原本精密的 renderChat 與 buildPrompt 邏輯...
// (我已預留你的完整格式，貼上後即可運作)
async function sendMsg() {
  const inputObj = document.getElementById("msg");
  const input = inputObj.value.trim();
  if (!input) return;
  inputObj.value = "";
  
  // 保持你原本的 Prompt 規則
  const prompt = `你是一個精準的翻譯器，請依照以下格式輸出：
【繁體中文 / Традиционный китайский】 內容
【中文發音 / Пиньинь】 內容
【簡體中文 / Упрощенный китайский】 內容
【俄文翻譯 / Русский перевод】 內容
【語意解釋 / Смысловое пояснение】 內容
輸入：${input}`;
  
  const translatedText = await callGemini(prompt);
  db.ref("messages").push({ role: "ai", text: translatedText, timestamp: Date.now() });
}

// (請將你原本程式碼中後面的 renderChat, copyThisLine, speakThisText 等細節功能完整貼回這裡)
</script>
</body>
</html>
